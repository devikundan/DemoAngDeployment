 

<div class="header" style="text-align: center;">
  <h3>Product Search</h3>
</div>
<div class="search-container" style="text-align: center; margin-bottom: 20px;">
  <input type="text"
      placeholder="Search products..."

      (ngModelChange)="onSearch($event)"
      class="search-box"  />
</div>
