<!-- cart-item.component.html -->
<div class="cart-page">
  <h2>🛍️ Your Cart</h2>

  <div *ngIf="items.length > 0; else emptyCart">
    <div class="cart-list">
      <div class="cart-item" *ngFor="let item of items">
        <img [src]="item.image" alt="{{ item.name }}" class="product-image" />
        <div class="item-details">
          <h3>{{ item.name }}</h3>
          <!-- <p>Price: ₹{{ item.price }}</p> -->
          <div class="qty-controls">
            <button (click)="decreaseQty(item)">-</button>
            <span>{{ item.qty }}</span>
            <button (click)="increaseQty(item)">+</button>

             <!-- ✅ DELETE BUTTON -->
    <button (click)="removeItem(item)">
      ❌  
    </button>

    
          </div>
          <!-- <p>Subtotal: ₹{{ item.price * item.qty }}</p> -->
        </div>
      </div>
    </div>

    <div class="cart-summary">
      <!-- <h3>Total Amount: ₹{{ totalPrice }}</h3> -->
         <button class="pay-btn" (click)="backtoshoping()">Back to Shopping</button>
      <button class="pay-btn" (click)="continueToPay()">Pay on Delivery</button>

    </div>
  </div>

  <ng-template #emptyCart>
    <p>Your cart is empty. Add items to continue.</p>
  </ng-template>

  
</div>
