<div class="product-list">
  <div class="card" *ngFor="let product of filteredProducts" (click)="goToDetails(product.pid)">
    <img [src]="product.image" [alt]="product.name" class="product-image" />
    <div class="product-info">
      <h3>{{ product.name }}</h3>
      <p>{{ product.description }}</p>
    </div>
  </div>

  <ng-template #noProducts>
    <p>No products found for ID {{ productId }}.</p>
  </ng-template>
</div>
